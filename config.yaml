# The config file

noise_model_t: 0.
noise_level_img: 0.

seed: 42
path_to_image: data/valentin.png
path_to_save: results/piche.png
model_path: model/ffhq_10m.pt

sigma                   : 0.001  # noise level associated with condition y
lambda_                 : 1.               # key parameter lambda            # use analytical solution
eta                     : 0.0               # eta for ddim samplingn  
zeta                    : 1.0
guidance_scale          : 1.0   

skip_type: "quad"

num_train_timesteps     : 1000
iter_num                : 1000             # set number of iterations
#iter_num_U              : 1                 # set number of inner iterations, default: 1


# noise schedule 
beta_start              : 0.0001
beta_end                : 0.02


# Guided diffusion
guided_diffusion:

  num_channels: 128
  num_res_blocks: 1
  attention_resolutions: "16"

  # clip_denoised: True
  # num_samples: 1
  # batch_size: 1
  # use_ddim: False
  # model_path: ''
  diffusion_steps: 1000
  noise_schedule: 'linear'
  num_head_channels: 64
  resblock_updown: True
  use_fp16: False
  use_scale_shift_norm: True
  num_heads: 4
  num_heads_upsample: -1
  use_new_attention_order: False
  timestep_respacing: ""
  use_kl: False
  predict_xstart: False
  rescale_timesteps: False
  rescale_learned_sigmas: False
  channel_mult: "1,1,2,2,4,4"
  learn_sigma: True
  class_cond: False
  use_checkpoint: False
  image_size: 256
  dropout: 0.

